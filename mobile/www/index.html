<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1"
    />
    <meta name="color-scheme" content="dark" />
    <title>Prompt2Eat</title>
    <style>
      :root {
        --forest: #0f241b;
        --cream: #fffdf8;
        --amber: #f4b43c;
        --sage: #7fa890;
      }
      * {
        margin: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
        padding: env(safe-area-inset-top) 24px env(safe-area-inset-bottom);
        background: var(--forest);
        color: var(--cream);
        font-family:
          "Hanken Grotesk", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        text-align: center;
        -webkit-font-smoothing: antialiased;
      }
      .wordmark {
        font-size: 26px;
        font-weight: 800;
        letter-spacing: -0.02em;
      }
      .wordmark span {
        color: var(--amber);
      }
      .spinner {
        width: 30px;
        height: 30px;
        border: 3px solid rgba(255, 255, 255, 0.15);
        border-top-color: var(--amber);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      .hint {
        font-size: 13px;
        color: var(--sage);
        max-width: 22rem;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .spinner {
          animation-duration: 2s;
        }
      }
    </style>
  </head>
  <body>
    <div class="wordmark">Prompt<span>2</span>Eat</div>
    <div class="spinner" role="status" aria-label="Loading"></div>
    <p class="hint">
      Loading your venue… If this screen stays, check your connection — the app
      needs to reach the Prompt2Eat server.
    </p>
  </body>
</html>
