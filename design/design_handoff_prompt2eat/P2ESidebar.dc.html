<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<aside style="width:100%; height:100%; min-height:100%; background:#0f241b; padding:18px 14px; display:flex; flex-direction:column; gap:4px;">
  <div style="display:flex; align-items:center; justify-content:space-between; padding:2px 6px 12px;">
    <div style="display:flex; align-items:center; gap:9px;"><dc-import name="P2EMark" variant="glow" size="26" hint-size="26px,26px"></dc-import><span style="font:800 17px 'Bricolage Grotesque'; color:#fff;">Prompt2Eat</span></div>
    <span style="color:#5d7268; font-size:16px;">«</span>
  </div>
  <div style="display:flex; align-items:center; gap:10px; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.08); border-radius:12px; padding:9px 11px; margin-bottom:8px;">
    <div style="width:30px;height:30px;border-radius:8px;background:repeating-linear-gradient(135deg,#caa15f 0 6px,#bf9352 6px 12px);"></div>
    <div style="flex:1;"><div style="font:700 12px 'Hanken Grotesk'; color:#fff;">Maple &amp; Thyme</div><div style="font:500 10px 'Hanken Grotesk'; color:#7fa890;">Camberwell</div></div>
    <span style="color:#9fb09a; font-size:13px;">⌄</span>
  </div>
  <div style="font:700 9px 'Space Mono'; color:#5d7268; letter-spacing:.16em; padding:6px 8px 5px;">MANAGE</div>
  <div style="{{ overviewStyle }}"><svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.7" style="flex-shrink:0;"><rect x="2" y="2" width="5.5" height="5.5" rx="1.5"></rect><rect x="10.5" y="2" width="5.5" height="5.5" rx="1.5"></rect><rect x="2" y="10.5" width="5.5" height="5.5" rx="1.5"></rect><rect x="10.5" y="10.5" width="5.5" height="5.5" rx="1.5"></rect></svg> Overview</div>
  <div style="{{ ordersStyle }}"><svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" style="flex-shrink:0;"><path d="M4 2.5h10v13l-2-1.3-2 1.3-2-1.3-2 1.3z" stroke-linejoin="round"></path><path d="M6.5 6.5h5M6.5 9.5h5" stroke-linecap="round"></path></svg> Orders <span style="{{ badgeStyle }}">{{ badge }}</span></div>
  <div style="{{ menuStyle }}"><svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" style="flex-shrink:0;"><path d="M3 4.5h12M3 9h12M3 13.5h8" stroke-linecap="round"></path></svg> Menu</div>
  <div style="{{ stockStyle }}"><svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" style="flex-shrink:0;"><path d="M3 5.7 9 2.7l6 3v6.6l-6 3-6-3z" stroke-linejoin="round"></path><path d="M3 5.7l6 3 6-3M9 8.7v6.6" stroke-linejoin="round"></path></svg> Stock</div>
  <div style="{{ tablesStyle }}"><svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" style="flex-shrink:0;"><rect x="2.5" y="2.5" width="5" height="5" rx="1"></rect><rect x="10.5" y="2.5" width="5" height="5" rx="1"></rect><rect x="2.5" y="10.5" width="5" height="5" rx="1"></rect><path d="M10.5 11v4.5M13 10.5h2.5M15.5 13v2.5" stroke-linecap="round"></path></svg> Tables</div>
  <div style="{{ storefrontStyle }}"><svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" style="flex-shrink:0;"><path d="M3 7v8h12V7" stroke-linejoin="round"></path><path d="M2 7l1.6-4.5h10.8L16 7" stroke-linejoin="round"></path><path d="M7 15v-4h4v4"></path></svg> Storefront</div>
  <div style="font:700 9px 'Space Mono'; color:#5d7268; letter-spacing:.16em; padding:12px 8px 5px;">BUSINESS</div>
  <div style="{{ paymentsStyle }}"><svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" style="flex-shrink:0;"><rect x="2" y="4" width="14" height="10" rx="2"></rect><path d="M2 7.5h14"></path></svg> Payments</div>
  <div style="{{ integrationsStyle }}"><svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" style="flex-shrink:0;"><circle cx="4.8" cy="13.2" r="2.3"></circle><circle cx="13.2" cy="4.8" r="2.3"></circle><path d="M6.6 11.4 11.4 6.6" stroke-linecap="round"></path></svg> Integrations</div>
  <div style="{{ appsStyle }}"><svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" style="flex-shrink:0;"><rect x="2.5" y="2.5" width="5.4" height="5.4" rx="1.5"></rect><rect x="10.1" y="2.5" width="5.4" height="5.4" rx="1.5"></rect><rect x="2.5" y="10.1" width="5.4" height="5.4" rx="1.5"></rect><circle cx="12.8" cy="12.8" r="2.8"></circle></svg> Apps</div>
  <div style="{{ billingStyle }}"><svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" style="flex-shrink:0;"><path d="M4 2.5h7l3 3v10H4z" stroke-linejoin="round"></path><path d="M10.5 2.5V6H14" stroke-linejoin="round"></path></svg> Billing</div>
  <div style="{{ settingsStyle }}"><svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" style="flex-shrink:0;"><circle cx="9" cy="9" r="2.4"></circle><path d="M9 2.5v2M9 13.5v2M2.5 9h2M13.5 9h2M4.4 4.4l1.4 1.4M12.2 12.2l1.4 1.4M13.6 4.4l-1.4 1.4M5.8 12.2l-1.4 1.4" stroke-linecap="round"></path></svg> Settings</div>
  <div style="margin-top:auto; display:flex; align-items:center; gap:10px; background:rgba(255,255,255,.05); border-radius:13px; padding:10px;">
    <div style="width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#F4B43C,#E2553A); display:flex; align-items:center; justify-content:center; font:800 13px 'Hanken Grotesk'; color:#fff;">S</div>
    <div style="flex:1;"><div style="font:700 12px 'Hanken Grotesk'; color:#fff;">Sofia Marin</div><div style="font:500 10px 'Hanken Grotesk'; color:#7fa890;">Owner</div></div>
    <span style="font:700 9px 'Space Mono'; color:#16241C; background:#F4B43C; border-radius:6px; padding:3px 7px;">PRO</span>
  </div>
</aside>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:244,&quot;height&quot;:800},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;overview&quot;,&quot;orders&quot;,&quot;menu&quot;,&quot;stock&quot;,&quot;tables&quot;,&quot;storefront&quot;,&quot;payments&quot;,&quot;integrations&quot;,&quot;apps&quot;,&quot;billing&quot;,&quot;settings&quot;],&quot;default&quot;:&quot;menu&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;badge&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;6&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const active = this.props.active ?? 'overview';
    const idle = "display:flex; align-items:center; gap:12px; padding:11px 13px; border-radius:11px; color:#c3d3c8; font:600 13px 'Hanken Grotesk';";
    const on = "display:flex; align-items:center; gap:12px; padding:11px 13px; border-radius:11px; background:#F4B43C; color:#16241C; font:700 13px 'Hanken Grotesk'; box-shadow:0 6px 14px -5px rgba(244,180,60,.5);";
    const st = (k) => (active === k ? on : idle);
    const badge = this.props.badge ?? '6';
    const badgeStyle = active === 'orders'
      ? "margin-left:auto; font:700 10px 'Hanken Grotesk'; color:#fff; background:#16241C; border-radius:999px; padding:2px 8px;"
      : "margin-left:auto; font:700 10px 'Hanken Grotesk'; color:#16241C; background:#F4B43C; border-radius:999px; padding:2px 8px;";
    return {
      overviewStyle: st('overview'), ordersStyle: st('orders'), menuStyle: st('menu'),
      tablesStyle: st('tables'), storefrontStyle: st('storefront'), paymentsStyle: st('payments'),
      billingStyle: st('billing'), settingsStyle: st('settings'),
      stockStyle: st('stock'), integrationsStyle: st('integrations'), appsStyle: st('apps'), badge, badgeStyle
    };
  }
}
</script>
</body>
</html>
