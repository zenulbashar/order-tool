<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<header style="{{ barStyle }}">
  <div style="display:flex; align-items:center; gap:9px;">
    <span style="font:800 17px 'Bricolage Grotesque'; color:{{ logoColor }}; letter-spacing:-.03em;">Prompt<span style="color:#F4B43C;">2</span>Eat</span>
    <span style="{{ opsBadge }}">OPS</span>
  </div>
  <nav style="display:flex; align-items:center; gap:3px; margin-left:14px;">
    <span style="{{ tDirectory }}">Directory</span>
    <span style="{{ tStats }}">Stats</span>
    <span style="{{ tPromotions }}">Promotions</span>
    <span style="{{ tMarketplace }}">Marketplace</span>
  </nav>
  <div style="margin-left:auto; display:flex; align-items:center; gap:12px;">
    <span style="{{ envBadge }}">● PROD</span>
    <span style="{{ opAvatar }}">OP</span>
  </div>
</header>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1036,&quot;height&quot;:58},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;directory&quot;,&quot;stats&quot;,&quot;promotions&quot;,&quot;marketplace&quot;],&quot;default&quot;:&quot;directory&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;theme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;light&quot;,&quot;dark&quot;],&quot;default&quot;:&quot;light&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const active = this.props.active ?? 'directory';
    const dark = (this.props.theme ?? 'light') === 'dark';
    const barStyle = "height:58px; flex-shrink:0; display:flex; align-items:center; gap:6px; padding:0 22px; "
      + (dark
        ? "background:#0f1b15; border-bottom:1px solid rgba(255,255,255,.08);"
        : "background:#FFFDF8; border-bottom:1px solid #e6ddcb;");
    const logoColor = dark ? '#F7F3EA' : '#16241C';
    const opsBadge = "font:700 9px 'Space Mono'; letter-spacing:.18em; border-radius:6px; padding:3px 7px; "
      + (dark ? "color:#16241C; background:#F4B43C;" : "color:#16241C; background:#F4B43C;");
    const on = "font:700 12px 'Hanken Grotesk'; color:#16241C; background:#F4B43C; border-radius:9px; padding:8px 14px;";
    const idle = dark
      ? "font:700 12px 'Hanken Grotesk'; color:#9DB2A5; padding:8px 14px;"
      : "font:700 12px 'Hanken Grotesk'; color:#6E756B; padding:8px 14px;";
    const t = (k) => (active === k ? on : idle);
    const envBadge = dark
      ? "font:700 9px 'Space Mono'; letter-spacing:.1em; color:#6fd39a; background:rgba(47,122,79,.2); border:1px solid rgba(111,211,154,.3); border-radius:999px; padding:4px 10px;"
      : "font:700 9px 'Space Mono'; letter-spacing:.1em; color:#2f7a4f; background:#e7f4ea; border:1px solid #c7e6ce; border-radius:999px; padding:4px 10px;";
    const opAvatar = "width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,#F4B43C,#E2553A); display:flex; align-items:center; justify-content:center; font:800 11px 'Hanken Grotesk'; color:#fff;";
    return {
      barStyle, logoColor, opsBadge, envBadge, opAvatar,
      tDirectory: t('directory'), tStats: t('stats'), tPromotions: t('promotions'), tMarketplace: t('marketplace')
    };
  }
}

</script>
</body>
</html>
