name: Audit reserved slugs
on:
  workflow_dispatch:
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm ci
      - name: Run reserved-slug audit (read-only)
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: npx tsx scripts/check-reserved-slugs.ts
