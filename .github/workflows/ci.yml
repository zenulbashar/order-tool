name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck, test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      # Pure domain-logic unit tests (money math). No DB — the Neon client is lazy.
      - run: npm test
      # The DB client connects lazily, so the build needs no DATABASE_URL.
      - run: npm run build

  e2e:
    name: E2E smoke (marketing/SEO)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      # Anonymous marketing/SEO routes only — no DB, only a dummy AUTH_SECRET.
      # Playwright's webServer builds + starts the app.
      - name: Run E2E smoke tests
        run: npm run test:e2e
        env:
          AUTH_SECRET: e2e-smoke-secret-not-real
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  migrate-prod:
    name: Migrate prod (additive only)
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Applies committed migrations only. Keep these ADDITIVE — destructive
      # changes (drop/rename/narrow) are run manually against prod. See README.
      - name: Apply additive migrations
        run: npm run db:migrate
        env:
          # Use the DIRECT (non-pooled) Neon URL for migrations.
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          # Included for parity with roster-tool's migrate step.
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
